<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrace" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#18181F" />
      <stop offset="100%" stop-color="#0A0A0C" />
    </radialGradient>
    
    <!-- Red Brand Glow -->
    <filter id="neonRedGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Outer Golden Accent Glow -->
    <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#CA8A04" />
    </radialGradient>

    <!-- Sleek Metallic Grey Gradient -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0" />
      <stop offset="50%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <!-- Red Neon Ring Gradient -->
    <linearGradient id="redNeon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B" />
      <stop offset="100%" stop-color="#FF3E3E" />
    </linearGradient>
  </defs>

  <!-- Base Card Frame / Rounded Corner App Launcher Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrace)" stroke="#2A2A2E" stroke-width="12" />

  <!-- Grid / Radar Accent Lines (Tech RPG style) -->
  <g opacity="0.15">
    <line x1="256" y1="30" x2="256" y2="482" stroke="#FF3E3E" stroke-width="2" />
    <line x1="30" y1="256" x2="482" y2="256" stroke="#FF3E3E" stroke-width="2" />
    <line x1="96" y1="96" x2="416" y2="416" stroke="#FF3E3E" stroke-width="1.5" stroke-dasharray="4 4" />
    <line x1="416" y1="96" x2="96" y2="416" stroke="#FF3E3E" stroke-width="1.5" stroke-dasharray="4 4" />
  </g>

  <!-- Outer Cyber Targets / Ring Guides -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#2A2A2E" stroke-width="4" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#redNeon)" stroke-width="3" stroke-dasharray="10 6" opacity="0.6" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="#2A2A2E" stroke-width="3" />

  <!-- Stylized Segment Rings (Subtle Cyber Darts Design) -->
  <g opacity="0.7">
    <!-- Outer Double Ring -->
    <circle cx="256" cy="256" r="160" fill="none" stroke="url(#redNeon)" stroke-width="8" filter="url(#neonRedGlow)" />
    <!-- Inner Triple Ring -->
    <circle cx="256" cy="256" r="95" fill="none" stroke="#FFD700" stroke-width="5" opacity="0.8" />
  </g>

  <!-- Bullseye Area (Middle Target) -->
  <circle cx="256" cy="256" r="45" fill="#111114" stroke="#2A2A2E" stroke-width="4" />
  <circle cx="256" cy="256" r="28" fill="none" stroke="#FFD700" stroke-width="2" stroke-dasharray="3 3" />
  <circle cx="256" cy="256" r="16" fill="url(#redNeon)" filter="url(#neonRedGlow)" />
  <circle cx="256" cy="256" r="6" fill="#FFFFFF" />

  <!-- Darts Element (Sleek cyber-dart piercing the bullseye at a 45 degree angle) -->
  <g transform="translate(256, 256) rotate(-45) translate(-256, -256)">
    <!-- Dart Body Shaft -->
    <line x1="256" y1="256" x2="256" y2="430" stroke="url(#metalGrad)" stroke-width="6" stroke-linecap="round" />
    <line x1="256" y1="360" x2="256" y2="410" stroke="#FF3E3E" stroke-width="10" stroke-linecap="round" filter="url(#neonRedGlow)" opacity="0.8" />
    
    <!-- Flights (Ailerons) of the Dart -->
    <path d="M256,410 L220,450 L256,440 L292,450 Z" fill="url(#redNeon)" stroke="#FFFFFF" stroke-width="1.5" />
    <path d="M256,400 L235,430 L256,423 L277,430 Z" fill="#111114" opacity="0.9" />

    <!-- Barrel / Grip Detail of Dart -->
    <rect x="251" y="290" width="10" height="40" rx="3" fill="url(#metalGrad)" stroke="#111114" stroke-width="1" />
    <line x1="251" y1="300" x2="261" y2="300" stroke="#111114" stroke-width="2" />
    <line x1="251" y1="310" x2="261" y2="310" stroke="#111114" stroke-width="2" />
    <line x1="251" y1="320" x2="261" y2="320" stroke="#111114" stroke-width="2" />

    <!-- Dart Tip touching the exact center point (256,256) -->
    <polygon points="256,245 252,290 260,290" fill="url(#metalGrad)" />
  </g>

  <!-- Glowing Corner Ornaments matching competitive RPG layout -->
  <rect x="35" y="35" width="20" height="4" fill="url(#redNeon)" filter="url(#neonRedGlow)" />
  <rect x="35" y="35" width="4" height="20" fill="url(#redNeon)" filter="url(#neonRedGlow)" />

  <rect x="457" y="35" width="20" height="4" fill="url(#redNeon)" filter="url(#neonRedGlow)" />
  <rect x="473" y="35" width="4" height="20" fill="url(#redNeon)" filter="url(#neonRedGlow)" />

  <rect x="35" y="473" width="20" height="4" fill="url(#redNeon)" filter="url(#neonRedGlow)" />
  <rect x="35" y="457" width="4" height="20" fill="url(#redNeon)" filter="url(#neonRedGlow)" />

  <rect x="457" y="473" width="20" height="4" fill="url(#redNeon)" filter="url(#neonRedGlow)" />
  <rect x="473" y="457" width="4" height="20" fill="url(#redNeon)" filter="url(#neonRedGlow)" />
</svg>
